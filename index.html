<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>MANI Magic — карта цвета</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#b5203a">

<!-- iOS: превращает страницу в приложение на весь экран без адресной строки -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MANI Magic">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">

<link rel="icon" href="assets/icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <main class="stage">
      <div class="card-wrap">
        <div id="card" class="card">
          <div id="cardFront" class="card-face card-front empty">
            <img id="frontImg" alt="Цвет маникюра">
          </div>
          <div class="card-face card-back">
            <img class="back-logo" src="assets/logo-mani-magic.png" alt="MANI Magic">
            <p id="phrase" class="phrase"></p>
          </div>
        </div>
        <button id="likeBtn" class="like-btn hidden" aria-label="Добавить в избранное">&#10084;</button>
        <button id="shareBtn" class="share-btn hidden" aria-label="Поделиться картой">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="2.6"></circle>
            <circle cx="6" cy="12" r="2.6"></circle>
            <circle cx="18" cy="19" r="2.6"></circle>
            <line x1="8.3" y1="10.8" x2="15.7" y2="6.2"></line>
            <line x1="8.3" y1="13.2" x2="15.7" y2="17.8"></line>
          </svg>
        </button>
      </div>

      <p id="hint" class="hint">Потрясите телефон, чтобы вытянуть карту</p>
    </main>

    <footer class="controls">
      <div class="controls-top">
        <button id="favBtn" class="fav-btn" aria-label="Открыть избранное">
          <span class="fav-heart">&#10084;</span><span id="favCount">0</span>
        </button>
        <div id="histNav" class="hist-nav">
          <button id="backBtn" class="hist-btn" aria-label="Предыдущая карта">&#8592;</button>
          <button id="fwdBtn" class="hist-btn" aria-label="Следующая карта">&#8594;</button>
        </div>
        <button id="filterBtn" class="filter-btn" aria-label="Фильтр по цвету">
          <span id="filterLabel">Все цвета</span>
        </button>
      </div>
      <button id="permBtn" class="btn btn-secondary hidden">Разрешить датчики движения</button>
      <button id="shakeBtn" class="btn btn-primary">Тряхнуть колоду</button>
      <button id="workBtn" class="btn btn-ghost hidden">Примеры работ</button>
    </footer>
  </div>

  <div id="filterOverlay" class="fav-overlay hidden">
    <button id="filterClose" class="work-close" aria-label="Закрыть">&times;</button>
    <h2 class="fav-title">Цвет маникюра</h2>
    <div id="filterList" class="filter-list"></div>
  </div>

  <div id="favOverlay" class="fav-overlay hidden">
    <button id="favClose" class="work-close" aria-label="Закрыть">&times;</button>
    <h2 class="fav-title">Понравилось</h2>
    <div id="favGrid" class="fav-grid"></div>
    <p id="favEmpty" class="fav-empty hidden">Пока пусто.<br>Нажмите &#10084; на карте, которая понравилась.</p>
  </div>

  <div id="workOverlay" class="work-overlay hidden">
    <button id="workClose" class="work-close" aria-label="Закрыть">&times;</button>
    <button id="workPrev" class="work-nav work-prev" aria-label="Предыдущее">&#8249;</button>
    <div class="work-stage">
      <img id="workImg" class="work-img" src="" alt="Пример готовой работы">
    </div>
    <button id="workNext" class="work-nav work-next" aria-label="Следующее">&#8250;</button>
    <div class="work-meta">
      <p id="workCaption" class="work-caption"></p>
      <p class="work-zoomhint">Щипок или двойной тап — увеличить</p>
      <div id="workDots" class="work-dots"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
